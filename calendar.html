<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭行事曆</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Noto Sans TC', 'Segoe UI', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  padding-bottom: 80px;
}


.app { max-width: 1100px; margin: 0 auto; padding: 16px; }

/* ─── Main layout ────────────────────── */
.main-row {
  display: grid;
  grid-template-columns: 1fr 220px;
  gap: 14px;
  align-items: start;
}
.main-left { min-width: 0; }
@media (max-width: 720px) {
  .main-row { grid-template-columns: 1fr; }
}

/* ─── Monthly notes ──────────────────── */
.notes-card {
  background: white; border-radius: 16px; padding: 16px;
  box-shadow: 0 2px 14px rgba(0,0,0,.07);
  border-left: 4px solid #667eea;
  position: sticky; top: 16px;
}
.notes-card h4 {
  font-size: .82rem; font-weight: 800; color: #667eea;
  margin-bottom: 10px; letter-spacing: .3px;
}
.notes-card textarea {
  width: 100%; min-height: 300px; border: none; outline: none;
  resize: none; font-family: inherit; font-size: .85rem;
  line-height: 1.7; color: #444; background: transparent;
}
.notes-saved-hint {
  font-size: .65rem; color: #bbb; margin-top: 6px; text-align: right; height: 14px;
}

/* ─── Header ─────────────────────── */
header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white; padding: 18px 22px; border-radius: 16px;
  margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between;
}
header h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -.5px; }
header .sub { font-size: .78rem; opacity: .8; margin-bottom: 3px; }
.notify-btn {
  background: rgba(255,255,255,.2); border: 1.5px solid rgba(255,255,255,.5);
  color: white; padding: 8px 14px; border-radius: 10px; cursor: pointer;
  font-size: .82rem; font-weight: 600; transition: background .2s; white-space: nowrap;
}
.notify-btn:hover { background: rgba(255,255,255,.35); }
.notify-btn.granted { background: rgba(255,255,255,.3); border-color: rgba(255,255,255,.8); }

/* ─── Category Tabs ──────────────── */
.cat-tabs {
  display: flex; gap: 8px; margin-bottom: 14px;
  overflow-x: auto; padding-bottom: 2px;
}
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  flex-shrink: 0; padding: 8px 16px; border-radius: 22px;
  border: 2px solid; cursor: pointer; font-size: .85rem; font-weight: 700;
  background: white; transition: all .18s;
}
.cat-tab[data-cat="all"]  { border-color: #636e72; color: #636e72; }
.cat-tab.active[data-cat="all"] { background: #636e72; color: white; }
.cat-tab[data-cat]        { border-color: var(--cc,#888); color: var(--cc,#888); }
.cat-tab.active[data-cat] { background: var(--cc,#888); color: white; border-color: var(--cc,#888); }

/* ─── Calendar Card ──────────────── */
.calendar-card {
  background: white; border-radius: 16px; padding: 18px;
  box-shadow: 0 2px 14px rgba(0,0,0,.07); margin-bottom: 14px;
}
.month-nav {
  display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 14px;
}
.month-nav .nav-btn { flex-shrink: 0; }
.month-nav h2 { font-size: 1.15rem; font-weight: 800; }
.nav-side { display: flex; align-items: center; gap: 4px; flex-shrink: 0; overflow: visible; }
.nav-side input[type=number]::-webkit-inner-spin-button,
.nav-side input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.nav-side input[type=number] { -moz-appearance: textfield; }
.nav-btn {
  background: #f0f2f5; border: none; border-radius: 8px; width: 34px; height: 34px;
  cursor: pointer; font-size: 1.1rem; color: #444; transition: background .15s;
  display: flex; align-items: center; justify-content: center;
}
.nav-btn:hover { background: #e0e2e5; }
.today-btn {
  background: #667eea; color: white; border: none; border-radius: 8px;
  padding: 7px 13px; cursor: pointer; font-size: .82rem; font-weight: 700;
  white-space: nowrap; writing-mode: horizontal-tb;
}

.weekdays { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; text-align: center; margin-bottom: 6px; }
.weekday { font-size: .75rem; font-weight: 700; color: #999; padding: 4px 0; }
.weekday:first-child { color: #e74c3c; }
.weekday:last-child  { color: #3498db; }

.days-grid { display: grid; grid-template-columns: repeat(7,minmax(0,1fr)); gap: 3px; }

.day-cell {
  min-height: 74px; padding: 5px 4px; border-radius: 10px;
  cursor: pointer; transition: background .12s; border: 1.5px solid transparent;
  min-width: 0; overflow: hidden;
}
.day-cell:hover { background: #f5f5ff; }
.day-cell.other-month { opacity: .3; }
.day-cell.today { background: #f0f0ff; border-color: #667eea; }

.day-num {
  font-size: .85rem; font-weight: 600; width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; margin-bottom: 3px;
}
.day-cell.today .day-num { background: #667eea; color: white !important; font-weight: 800; }
.days-grid > .day-cell:nth-child(7n+1) .day-num { color: #e74c3c; }
.days-grid > .day-cell:nth-child(7n)   .day-num { color: #3498db; }

.event-bars { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
.event-bar {
  font-size: .67rem; padding: 1px 5px; border-radius: 4px;
  color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
  line-height: 1.5; display: flex; align-items: center; gap: 2px;
}
.event-bar[data-cat] { background: var(--cc, #888); }
.event-bar .rep-icon { font-size: .6rem; opacity: .9; flex-shrink: 0; }
.event-more { font-size: .65rem; color: #667eea; padding-left: 3px; cursor: pointer; font-weight: 700; }
.event-more:hover { text-decoration: underline; }

/* ─── Day detail modal ───────────────── */
.day-modal-item {
  display: flex; align-items: center; gap: 12px; padding: 11px 8px;
  border-radius: 10px; cursor: pointer; transition: background .12s;
  border-bottom: 1px solid #f0f0f0;
}
.day-modal-item:hover { background: #f5f5ff; }
.day-modal-item:last-child { border-bottom: none; }
.day-modal-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--cc,#888); flex-shrink: 0; }
.day-modal-info { flex: 1; min-width: 0; }
.day-modal-title-text { font-size: .9rem; font-weight: 700; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-modal-meta { font-size: .75rem; color: #aaa; margin-top: 2px; }
.festival-label {
  font-size: .58rem; color: #aaa; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1; flex: 1; min-width: 0;
}
.festival-badge {
  font-size: .65rem; background: #f5f5f5; color: #aaa;
  padding: 1px 7px; border-radius: 8px; font-weight: 600;
}
.event-bar.span-start::after { content: ' ›'; opacity: .8; }
.event-bar.span-mid  { opacity: .78; }
.event-bar.span-mid::before  { content: '‹ '; opacity: .8; }
.event-bar.span-mid::after   { content: ' ›'; opacity: .8; }
.event-bar.span-end  { opacity: .78; }
.event-bar.span-end::before  { content: '‹ '; opacity: .8; }

/* ── 已過期 / 已完成 ── */
.event-bar.past { opacity: .32; filter: grayscale(55%); }
.event-item.past { opacity: .38; filter: grayscale(55%); }
.event-item.past:hover { opacity: .55; }

@media (max-width: 500px) {
  .event-bar { display: none; }
  .day-cell.has-events::after {
    content: ''; display: block; width: 5px; height: 5px;
    border-radius: 50%; background: #667eea; margin: 0 auto;
  }
  .day-cell { min-height: 52px; }
}

/* ─── Events List ─────────────────── */
.events-card {
  background: white; border-radius: 16px; padding: 18px;
  box-shadow: 0 2px 14px rgba(0,0,0,.07);
}
.events-card-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
}
.events-card-header h3 { font-size: 1rem; font-weight: 800; }

.date-group-label {
  font-size: .78rem; font-weight: 700; color: #888;
  margin: 12px 0 6px; padding-left: 4px; display: flex; align-items: center; gap: 6px;
  cursor: pointer; user-select: none;
}
.today-badge {
  background: #667eea; color: white; font-size: .68rem; padding: 1px 7px; border-radius: 8px;
}
.group-toggle {
  margin-left: auto; font-size: .7rem; color: #bbb; transition: transform .2s; display: inline-block;
}
.group-toggle.collapsed { transform: rotate(-90deg); }
.group-body { overflow: hidden; transition: max-height .25s ease; }
.group-body.collapsed { max-height: 0 !important; }
.event-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 12px;
  border-radius: 12px; margin-bottom: 6px; cursor: pointer;
  transition: background .15s; border: 1px solid #f0f0f0;
}
.event-item:hover { background: #f8f8ff; }
.ev-bar { width: 4px; min-height: 38px; border-radius: 2px; flex-shrink: 0; }
.ev-bar[data-cat] { background: var(--cc, #888); }
.ev-info { flex: 1; min-width: 0; }
.ev-title { font-weight: 700; font-size: .9rem; display: flex; align-items: center; gap: 5px; }
.ev-title .rep-badge {
  font-size: .68rem; background: #eee; color: #666; padding: 1px 6px; border-radius: 6px; font-weight: 600;
}
.ev-meta  { font-size: .76rem; color: #999; margin-top: 3px; }
.ev-badge {
  font-size: .72rem; padding: 3px 9px; border-radius: 12px; color: white; font-weight: 700; flex-shrink: 0;
}
.ev-badge[data-cat] { background: var(--cc, #888); }
.no-events { text-align: center; color: #bbb; padding: 32px; font-size: .9rem; }

/* ─── Modal ───────────────────────── */
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 999; align-items: flex-end; justify-content: center; padding: 0;
}
.overlay.show { display: flex; }
@media (min-width: 520px) {
  .overlay { align-items: center; padding: 16px; }
  .modal { border-radius: 20px !important; max-height: 90vh !important; }
}
.modal {
  background: white; border-radius: 20px 20px 0 0;
  padding: 24px 20px; width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;
}
.modal-header h3 { font-size: 1.1rem; font-weight: 800; }
.close-btn {
  background: #f0f2f5; border: none; border-radius: 8px; width: 32px; height: 32px;
  cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; color: #555;
}
.form-group { margin-bottom: 14px; }
label { display: block; font-size: .83rem; font-weight: 700; color: #555; margin-bottom: 6px; }

input[type="text"], input[type="date"], input[type="time"], select, textarea {
  width: 100%; padding: 10px 13px; border: 2px solid #e8e8e8; border-radius: 10px;
  font-size: .9rem; font-family: inherit; outline: none; transition: border-color .2s; background: white;
}
input:focus, select:focus, textarea:focus { border-color: #667eea; }
textarea { resize: vertical; min-height: 60px; }

/* Category radios */
.cat-radio-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cat-radio { display: none; }
.cat-radio-label {
  display: block; padding: 10px 8px; border-radius: 10px; border: 2px solid #e8e8e8;
  text-align: center; cursor: pointer; font-size: .85rem; font-weight: 700; color: #888; transition: all .18s;
}
.cat-radio:checked + .cat-radio-label { background: var(--cc,#888); border-color: var(--cc,#888); color: white; }
.cat-radio-label { border-color: var(--cc,#888); color: var(--cc,#888); }

/* Repeat radios */
.repeat-group { display: flex; flex-wrap: wrap; gap: 7px; }
.rep-radio { display: none; }
.rep-label {
  padding: 7px 13px; border-radius: 8px; border: 2px solid #e8e8e8;
  cursor: pointer; font-size: .82rem; font-weight: 700; color: #888; transition: all .18s;
}
.rep-radio:checked + .rep-label { background: #667eea; border-color: #667eea; color: white; }

/* Custom weekday picker */
.weekday-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.wd-check { display: none; }
.wd-label {
  width: 34px; height: 34px; border-radius: 50%; border: 2px solid #e0e0e0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: .8rem; font-weight: 700; color: #888; transition: all .15s;
}
.wd-check:checked + .wd-label { background: #667eea; border-color: #667eea; color: white; }
.wd-label.sun { border-color: #ffd0d0; color: #e74c3c; }
.wd-label.sat { border-color: #d0e4ff; color: #3498db; }
.wd-check:checked + .wd-label.sun { background: #e74c3c; border-color: #e74c3c; color: white; }
.wd-check:checked + .wd-label.sat { background: #3498db; border-color: #3498db; color: white; }

/* Category manager */
.cat-mgr-item { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:10px; background:#fafafa; border:1px solid #eee; margin-bottom:6px; }
.cat-mgr-swatch { width:22px; height:22px; border-radius:50%; flex-shrink:0; }
.cat-mgr-name { flex:1; font-size:.9rem; font-weight:700; }
.cat-mgr-edit { background:none; border:none; cursor:pointer; font-size:.85rem; color:#667eea; font-weight:700; padding:2px 6px; }
.cat-mgr-del  { background:none; border:none; cursor:pointer; font-size:1rem; color:#dc3545; padding:2px 4px; }
.cat-mgr-move { background:none; border:none; cursor:pointer; font-size:.85rem; color:#aaa; padding:2px 3px; line-height:1; }
.cat-mgr-move:hover { color:#555; }
.cat-mgr-move:disabled { opacity:.2; cursor:default; }
.cat-add-row  { display:flex; gap:7px; align-items:center; margin-top:10px; }
.cat-add-row input[type="text"]  { flex:1; }
.cat-add-row input[type="color"] { width:42px; height:38px; padding:2px; border:2px solid #e8e8e8; border-radius:8px; cursor:pointer; }
.manage-cat-btn { background:none; border:2px dashed #ccc; border-radius:22px; padding:7px 14px; font-size:.82rem; color:#aaa; cursor:pointer; flex-shrink:0; transition:all .15s; }
.manage-cat-btn:hover { border-color:#667eea; color:#667eea; }

/* Exception dates */
.exc-item { display:flex; align-items:center; justify-content:space-between; padding:5px 9px; background:#fff0f2; border-radius:8px; margin-bottom:4px; font-size:.82rem; color:#555; }
.exc-del  { background:none; border:none; color:#dc3545; cursor:pointer; font-size:1.1rem; line-height:1; padding:0 2px; }
.exc-add-row { display:flex; gap:8px; margin-top:6px; }
.exc-add-row input { flex:1; }
.exc-add-btn { background:#667eea; color:white; border:none; border-radius:8px; padding:9px 13px; font-size:.82rem; font-weight:700; cursor:pointer; white-space:nowrap; }

.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Modal actions */
.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.btn-save {
  flex: 1; background: linear-gradient(135deg, #667eea, #764ba2);
  color: white; border: none; border-radius: 10px; padding: 13px;
  font-size: .92rem; font-weight: 700; cursor: pointer;
}
.btn-delete {
  background: #fff0f0; color: #dc3545; border: none; border-radius: 10px;
  padding: 13px 16px; font-size: .92rem; font-weight: 700; cursor: pointer;
}
.btn-copy {
  background: #f0f4ff; color: #667eea; border: none; border-radius: 10px;
  padding: 13px 16px; font-size: .92rem; font-weight: 700; cursor: pointer;
}

/* Emoji picker */
.emoji-picker-wrap { position: relative; }
.emoji-btn {
  width:44px; height:38px; border:2px solid #e8e8e8; border-radius:8px;
  font-size:1.1rem; cursor:pointer; background:white; display:flex;
  align-items:center; justify-content:center;
}
.emoji-panel {
  display:none; position:absolute; top:calc(100% + 4px); left:0; z-index:2000;
  background:white; border:1px solid #e0e0e0; border-radius:12px;
  padding:8px; box-shadow:0 4px 20px rgba(0,0,0,.15);
  width:220px; flex-wrap:wrap; gap:2px;
}
.emoji-panel.open { display:flex; }
.emoji-opt {
  width:34px; height:34px; font-size:1.1rem; border:none; background:none;
  cursor:pointer; border-radius:6px; display:flex; align-items:center; justify-content:center;
  transition:background .1s;
}
.emoji-opt:hover { background:#f0f0f0; }

/* FAB */
.fab {
  position: fixed; bottom: 22px; right: 22px; width: 56px; height: 56px;
  background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none;
  border-radius: 50%; font-size: 1.6rem; cursor: pointer;
  box-shadow: 0 4px 18px rgba(102,126,234,.5); transition: transform .2s;
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.fab:hover { transform: scale(1.1); }
</style>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div style="display:flex;align-items:center;gap:10px;min-width:0">
      <div>
        <div class="sub" id="header-sub">生活管理</div>
        <h1 id="header-title">🗓 家庭行事曆</h1>
      </div>
      <button onclick="openTitleEditor()" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:white;border-radius:6px;width:20px;height:20px;cursor:pointer;font-size:.55rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;" title="編輯標題">✏️</button>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
      <button class="notify-btn" id="notify-btn" onclick="requestNotify()" style="font-size:.58rem;padding:3px 7px;opacity:.6;width:100%">🔔 開啟提醒</button>
      <button class="notify-btn" onclick="exportBackup()" title="匯出備份" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);font-size:.58rem;padding:3px 7px;opacity:.6;width:100%">💾 備份</button>
      <button class="notify-btn" onclick="document.getElementById('import-file').click()" title="匯入備份" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);font-size:.58rem;padding:3px 7px;opacity:.6;width:100%">📂 還原</button>
      <button class="notify-btn" onclick="changeRoom()" title="切換房間" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);font-size:.58rem;padding:3px 7px;opacity:.6;width:100%">🏠 切換房間</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importBackup(event)">
    </div>
  </header>

  <!-- Category Tabs -->
  <div class="cat-tabs" id="cat-tabs">
    <button class="cat-tab active" data-cat="all" onclick="setCategory('all')">📋 全部匯整</button>
    <button class="manage-cat-btn" onclick="openCatManager()">⚙ 管理分類</button>
  </div>

  <div class="main-row">
    <div class="main-left">

      <!-- Calendar -->
      <div class="calendar-card">
        <div class="month-nav">
          <button class="nav-btn" onclick="prevMonth()">‹</button>
          <div class="nav-side">
            <select id="sel-year"  onchange="jumpToYearMonth()" style="width:58px;font-size:1rem;font-weight:800;border:none;background:transparent;outline:none;text-align:right;padding:0;cursor:pointer;-webkit-appearance:none;appearance:none"></select><span style="font-size:1rem;font-weight:800"> 年</span>
            <select id="sel-month" onchange="jumpToYearMonth()" style="width:34px;font-size:1rem;font-weight:800;border:none;background:transparent;outline:none;text-align:right;padding:0;cursor:pointer;-webkit-appearance:none;appearance:none"></select><span style="font-size:1rem;font-weight:800"> 月</span>
            <button class="today-btn" onclick="goToday()">今天</button>
          </div>
          <button class="nav-btn" onclick="nextMonth()">›</button>
        </div>
        <div class="weekdays">
          <div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div>
          <div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div>
          <div class="weekday">六</div>
        </div>
        <div class="days-grid" id="days-grid"></div>
      </div>

      <!-- Events List -->
      <div class="events-card">
        <div class="events-card-header">
          <h3 id="list-title">📋 全部事項匯整</h3>
          <div style="display:flex;gap:6px">
            <button onclick="collapseAll(true)"  style="background:none;border:1.5px solid #ddd;border-radius:8px;padding:4px 10px;font-size:.75rem;color:#888;cursor:pointer">全縮</button>
            <button onclick="collapseAll(false)" style="background:none;border:1.5px solid #ddd;border-radius:8px;padding:4px 10px;font-size:.75rem;color:#888;cursor:pointer">全展</button>
          </div>
        </div>
        <div id="events-list"></div>
      </div>

    </div>

    <!-- Monthly Notes -->
    <div class="notes-card">
      <h4 id="notes-title">📝 本月備註</h4>
      <textarea id="month-notes" oninput="saveMonthNotes()"></textarea>

<script>
// ── Firebase ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBc6Odgado5F0FMFP6ctiJ9ITH88QGmK4k",
  authDomain: "family-calendar-3ba9c.firebaseapp.com",
  projectId: "family-calendar-3ba9c",
  storageBucket: "family-calendar-3ba9c.firebasestorage.app",
  messagingSenderId: "559858475926",
  appId: "1:559858475926:web:2ffc55ddd629aedcfab3b7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let roomId = localStorage.getItem('fam-cal-room');
let isRemoteUpdate = false;
let unsubListener = null;

function getDocRef() {
  return db.collection('rooms').doc(roomId).collection('calendar').doc('data');
}

async function saveToCloud(patch) {
  if (!roomId || isRemoteUpdate) return;
  try { await getDocRef().set(patch, { merge: true }); }
  catch(e) { console.error('雲端儲存失敗', e); }
}

function startSync() {
  if (unsubListener) unsubListener();
  if (!roomId) return;
  unsubListener = getDocRef().onSnapshot(snap => {
    if (!snap.exists) {
      // 新房間 — 寫入預設值
      getDocRef().set({
        events: [],
        categories: DEFAULT_CATS,
        notes: {},
        headerSub: localStorage.getItem('fam-cal-sub') || '生活管理',
        headerTitle: localStorage.getItem('fam-cal-title') || '🗓 家庭行事曆'
      });
      return;
    }
    isRemoteUpdate = true;
    const d = snap.data();
    if (Array.isArray(d.events))     events     = d.events;
    if (Array.isArray(d.categories)) { categories = d.categories; rebuildCAT(); renderCatTabs(); renderCatRadios(); }
    if (d.headerSub)   { localStorage.setItem('fam-cal-sub',   d.headerSub); }
    if (d.headerTitle) { localStorage.setItem('fam-cal-title', d.headerTitle); }
    if (d.notes)       allNotes = d.notes;
    applyHeaderTitle();
    renderCalendar(); renderList(); loadMonthNotes(); scheduleAll();
    isRemoteUpdate = false;
  }, err => { console.error('Firestore 監聽失敗', err); });
}

function joinRoom() {
  const code = document.getElementById('f-room-code').value.trim();
  const statusEl = document.getElementById('room-status');
  if (!code || code.length < 4) { statusEl.textContent = '請輸入至少 4 個字的房間碼'; return; }
  roomId = code;
  localStorage.setItem('fam-cal-room', roomId);
  document.getElementById('room-overlay').classList.remove('show');
  startSync();
}

function changeRoom() {
  if (!confirm('切換房間後，目前顯示的資料會改變。確定嗎？')) return;
  if (unsubListener) unsubListener();
  localStorage.removeItem('fam-cal-room');
  roomId = null;
  events = []; allNotes = {};
  document.getElementById('f-room-code').value = '';
  document.getElementById('room-overlay').classList.add('show');
}

// ── State ───────────────────────────────────────────────
let curMonth = new Date().getMonth();
let curYear  = new Date().getFullYear();
let activeCat = 'all';
let editingId = null;
let timers = {};
let editingExceptions = [];
let listCollapsed = {};
let allNotes = {};
let events = [];

function collapseAll(collapse) {
  document.querySelectorAll('#events-list .group-body').forEach(body => {
    const arrow = body.previousSibling?.querySelector?.('.group-toggle');
    const ds = body.dataset.ds;
    listCollapsed[ds] = collapse;
    body.classList.toggle('collapsed', collapse);
    body.style.maxHeight = collapse ? '0' : body.scrollHeight + 'px';
    if (arrow) arrow.classList.toggle('collapsed', collapse);
  });
}

// ── Header title ─────────────────────────────────────────
function applyHeaderTitle() {
  const sub   = localStorage.getItem('fam-cal-sub')   || '生活管理';
  const title = localStorage.getItem('fam-cal-title') || '🗓 家庭行事曆';

function saveTitleEditor() {

  const title = document.getElementById('f-header-title').value.trim() || '🗓 家庭行事曆';

  localStorage.setItem('fam-cal-title', title);
  saveToCloud({ headerSub: sub, headerTitle: title });
  applyHeaderTitle();
  closeTitleEditor();
}

// ── Categories (dynamic) ────────────────────────────────
const DEFAULT_CATS = [
  { id:'kids',      name:'小孩',   icon:'👶', color:'#e91e8c' },
  { id:'parents',   name:'父母',   icon:'👨‍👩', color:'#f39c12' },
  { id:'work',      name:'工作',   icon:'💼', color:'#6c5ce7' },
  { id:'personal',  name:'屬自己', icon:'🌿', color:'#00b894' },
  { id:'important', name:'重要日子',icon:'⭐', color:'#e17055' },
];
let categories = DEFAULT_CATS;

function persistCats() { saveToCloud({ categories }); }
function getCat(id)    { return categories.find(c => c.id === id) || { name:id, icon:'', color:'#888' }; }
function getCatColor(id) { return getCat(id).color; }

// Legacy CAT object (kept for compatibility) — rebuilt dynamically
let CAT = {};
function rebuildCAT() { CAT = {}; categories.forEach(c => { CAT[c.id] = c.icon + ' ' + c.name; }); }
rebuildCAT();
const REPEAT_LABEL = { daily:'每天', weekly:'每週', monthly:'每月', yearly:'每年', custom:'自訂週' };
const WD_NAMES = ['日','一','二','三','四','五','六'];

function renderCatTabs() {
  const tabs = document.getElementById('cat-tabs');
  // remove old dynamic tabs (keep "全部" and manage button)
  [...tabs.querySelectorAll('[data-cat]:not([data-cat="all"])')].forEach(el => el.remove());
  const manageBtn = tabs.querySelector('.manage-cat-btn');
  categories.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (activeCat === c.id ? ' active' : '');
    btn.dataset.cat = c.id;
    btn.style.setProperty('--cc', c.color);
    btn.textContent = c.icon + ' ' + c.name;
    btn.onclick = () => setCategory(c.id);
    tabs.insertBefore(btn, manageBtn);
  });
}

function renderCatRadios() {
  const grp = document.getElementById('cat-radio-group');
  grp.innerHTML = '';
  categories.forEach(c => {
    const inp = document.createElement('input');
    inp.type = 'radio'; inp.className = 'cat-radio'; inp.name = 'rcat';
    inp.id = 'r-' + c.id; inp.value = c.id;

    const lbl = document.createElement('label');
    lbl.htmlFor = 'r-' + c.id;
    lbl.className = 'cat-radio-label';
    lbl.style.setProperty('--cc', c.color);
    lbl.textContent = c.icon + ' ' + c.name;

    grp.appendChild(inp);
    grp.appendChild(lbl);
  });
}

// ── Init ─────────────────────────────────────────────────
function init() {
  applyHeaderTitle();
  renderCatTabs();
  renderCatRadios();
  renderCalendar();
  renderList();
  loadMonthNotes();
  scheduleAll();
  updateNotifyBtn();

  // 註冊 Service Worker（讓關閉網頁後也能收到提醒）
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW 註冊失敗', e));
  }

  // Show/hide repeat-end row and exceptions row when repeat radio changes
  document.querySelectorAll('input[name="rrep"]').forEach(r =>
    r.addEventListener('change', () => {
      const v = document.querySelector('input[name="rrep"]:checked')?.value;
      const show = v && v !== 'none' ? 'block' : 'none';
      document.getElementById('repeat-end-row').style.display = show;
      document.getElementById('exceptions-row').style.display = show;
      document.getElementById('custom-days-row').style.display = v === 'custom' ? 'block' : 'none';
    })
  );

  // Room code check
  if (!roomId) {
    document.getElementById('room-overlay').classList.add('show');
  } else {
    startSync();
  }
}

// ── Notifications ─────────────────────────────────────────
function updateNotifyBtn() {
  const btn = document.getElementById('notify-btn');
  if (!('Notification' in window)) { btn.style.display = 'none'; return; }
  if (Notification.permission === 'granted') {
    btn.textContent = '🔔 提醒已開啟';
    btn.classList.add('granted');
  }
}

async function requestNotify() {
  if (!('Notification' in window)) { alert('您的瀏覽器不支援通知'); return; }
  if (Notification.permission === 'granted') { alert('✅ 提醒已開啟！'); return; }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') { scheduleAll(); updateNotifyBtn(); alert('✅ 提醒已開啟！'); }
  else alert('❌ 請在瀏覽器設定中允許通知，才能使用提醒功能。');
}

function scheduleAll() {
  Object.values(timers).forEach(clearTimeout);
  timers = {};
  if (Notification.permission !== 'granted') return;

  // 取消舊的 SW 排程通知
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.ready.then(reg =>
      reg.getNotifications().then(ns => ns.forEach(n => n.close()))
    ).catch(() => {});
  }

  const now = Date.now();
  const WINDOW = 8 * 24 * 60 * 60 * 1000; // look-ahead 8 days

  events.forEach(ev => {
    if (ev.reminder === null || ev.reminder === undefined) return;

    const repeat = ev.repeat || 'none';
    if (repeat === 'none') {
      scheduleSingle(ev, ev.date, now, WINDOW);
    } else {
      // Schedule next 8 days of occurrences
      const today = new Date();
      for (let i = 0; i <= 8; i++) {
        const d = new Date(today);
        d.setDate(d.getDate() + i);
        const ds = toDateStr(d);
        if (isEventOnDate(ev, ds)) scheduleSingle(ev, ds, now, WINDOW);
      }
    }
  });
}

function scheduleSingle(ev, ds, now, window_ms) {
  const fireAt = getReminderFireTime(ev, ds);
  if (!fireAt) return;
  const diff = fireAt - now;
  if (diff <= 0 || diff >= window_ms) return;

  const key = `${ev.id}:${ds}`;

  // 優先使用 TimestampTrigger（關閉網頁也能收到通知）
  if ('serviceWorker' in navigator && typeof TimestampTrigger !== 'undefined') {
    navigator.serviceWorker.ready.then(reg =>
      reg.showNotification('🔔 ' + ev.title, {
        body: buildReminderBody(ev, ds),
        tag: key,
        showTrigger: new TimestampTrigger(fireAt)
      })
    ).catch(() => {
      timers[key] = setTimeout(() => fireNotification(ev, ds), diff);
    });
  } else {
    // 備用：網頁開著才能收到
    timers[key] = setTimeout(() => fireNotification(ev, ds), diff);
  }
}

function buildReminderBody(ev, ds) {
  const r = ev.reminder;
  const txt = r === 0 ? '現在開始' : r < 60 ? `${r} 分鐘後開始` : r < 1440 ? `${r/60} 小時後開始` : `${r/1440} 天後開始`;
  const cat = getCat(ev.category);
  return `${cat.icon} ${cat.name} · ${formatDateLabel(ds)}${ev.time ? ' ' + ev.time : ''} · ${txt}`;
}

function getReminderFireTime(ev, ds) {
  const r = ev.reminder; // null = no remind, 0 = at time, >0 = N mins before
  if (r === null || r === undefined) return null;

  if (ev.time) {
    const evTime = new Date(`${ds}T${ev.time}`).getTime();
    return evTime - r * 60000;
  } else {
    // No specific time → fire at 9am, offset by days
    const d = new Date(`${ds}T09:00:00`);
    if (r >= 1440) d.setDate(d.getDate() - Math.floor(r / 1440));
    return d.getTime();
  }
}

function fireNotification(ev, ds) {
  if (Notification.permission !== 'granted') return;
  const repTxt = ev.repeat && ev.repeat !== 'none' ? ' 🔁' : '';
  new Notification('🔔 ' + ev.title + repTxt, {
    body: buildReminderBody(ev, ds),
    tag: `${ev.id}:${ds}`,
  });
}

// ── Recurring logic ───────────────────────────────────────
function isEventOnDate(ev, ds) {
  const eDate = effectiveDate(ev);
  if (ds < eDate) return false;
  if (ev.repeatEnd && ds > ev.repeatEnd) return false;
  if (ev.exceptions && ev.exceptions.includes(ds)) return false;

  const repeat = ev.repeat || 'none';
  if (repeat === 'none') {
    const endDate = ev.endDate || eDate;
    return ds >= eDate && ds <= endDate;
  }

  const evD = parseLocalDate(ev.date);
  const d   = parseLocalDate(ds);

  if (repeat === 'daily') {
    if (!ev.shiftIfHoliday) return true;
    return !isHoliday(ds); // skip holidays entirely for daily
  }

  if (repeat === 'weekly') {
    if (!ev.shiftIfHoliday) return d.getDay() === evD.getDay();
    // Find natural occurrence (same weekday) in the same week
    const diff = evD.getDay() - d.getDay();
    const nat = new Date(d); nat.setDate(d.getDate() + diff);
    const natStr = toDateStr(nat);
    const effStr = isHoliday(natStr) ? prevWorkday(natStr) : natStr;
    return ds === effStr;
  }

  if (repeat === 'monthly') {
    if (!ev.shiftIfHoliday) return d.getDate() === evD.getDate();
    const y = d.getFullYear(), m = d.getMonth();
    const lastDay = new Date(y, m + 1, 0).getDate();
    const natDay = Math.min(evD.getDate(), lastDay);
    const natStr = `${y}-${pad(m + 1)}-${pad(natDay)}`;
    const effStr = isHoliday(natStr) ? prevWorkday(natStr) : natStr;
    return ds === effStr;
  }

  if (repeat === 'yearly') {
    if (!ev.shiftIfHoliday) return d.getMonth() === evD.getMonth() && d.getDate() === evD.getDate();
    const natStr = `${d.getFullYear()}-${pad(evD.getMonth() + 1)}-${pad(evD.getDate())}`;
    const effStr = isHoliday(natStr) ? prevWorkday(natStr) : natStr;
    return ds === effStr;
  }

  if (repeat === 'custom') {
    const days = ev.customDays || [];
    return days.includes(d.getDay());
  }

  return false;
}

// Find next occurrence >= fromDate (or null if none)
function nextOccurrence(ev, fromDate) {
  const repeat = ev.repeat || 'none';
  const start = fromDate < ev.date ? ev.date : fromDate;

  if (repeat === 'none') {
    const ed = effectiveDate(ev);
    const endDate = ev.endDate || ed;
    if (fromDate > endDate) return null;
    return ed;
  }

  // Max search range
  const maxDays = repeat === 'yearly' ? 370 : repeat === 'monthly' ? 35 : (repeat === 'weekly' || repeat === 'custom') ? 10 : 1;
  const d = parseLocalDate(start);
  for (let i = 0; i <= maxDays; i++) {
    const ds = toDateStr(d);
    if (isEventOnDate(ev, ds)) return ds;
    d.setDate(d.getDate() + 1);
  }
  return null;
}

// ── Calendar ──────────────────────────────────────────────
function updateYearMonthSelectors() {
  const ySel = document.getElementById('sel-year');
  const mSel = document.getElementById('sel-month');

  // Build year list if empty or range needs extending
  const minY = Math.min(curYear, 2020), maxY = Math.max(curYear, 2035);
  if (!ySel.options.length ||
      parseInt(ySel.options[0].value) > minY ||
      parseInt(ySel.options[ySel.options.length-1].value) < maxY) {
    ySel.innerHTML = '';
    for (let y = minY; y <= maxY; y++) {
      const o = document.createElement('option');
      o.value = y; o.textContent = y;
      ySel.appendChild(o);
    }
  }
  ySel.value = curYear;

  if (!mSel.options.length) {
    for (let m = 1; m <= 12; m++) {
      const o = document.createElement('option');
      o.value = m - 1; o.textContent = m;
      mSel.appendChild(o);
    }
  }
  mSel.value = curMonth;
}

function jumpToYearMonth() {
  curYear  = parseInt(document.getElementById('sel-year').value);
  curMonth = parseInt(document.getElementById('sel-month').value);
  renderCalendar(); loadMonthNotes();
}

function renderCalendar() {
  updateYearMonthSelectors();
  const grid = document.getElementById('days-grid');
  grid.innerHTML = '';

  const firstDow  = new Date(curYear, curMonth, 1).getDay();
  const daysInCur  = new Date(curYear, curMonth + 1, 0).getDate();
  const daysInPrev = new Date(curYear, curMonth,     0).getDate();
  const todayStr   = toDateStr(new Date());

  for (let i = firstDow - 1; i >= 0; i--)
    grid.appendChild(makeCell(daysInPrev - i, curMonth - 1, curYear, true, todayStr));
  for (let d = 1; d <= daysInCur; d++)
    grid.appendChild(makeCell(d, curMonth, curYear, false, todayStr));
  const total = grid.children.length;
  const rows  = Math.ceil(total / 7);
  for (let d = 1; d <= rows * 7 - total; d++)
    grid.appendChild(makeCell(d, curMonth + 1, curYear, true, todayStr));
}

function makeCell(day, month, year, other, todayStr) {
  let m = month, y = year;
  if (m < 0)  { m = 11; y--; }
  if (m > 11) { m = 0;  y++; }
  const ds = `${y}-${pad(m+1)}-${pad(day)}`;

  const cell = document.createElement('div');
  cell.className = 'day-cell' + (other ? ' other-month' : '') + (ds === todayStr ? ' today' : '');
  cell.onclick = () => openAddModal(ds);

  const dayRow = document.createElement('div');
  dayRow.style.cssText = 'display:flex;align-items:center;gap:3px;margin-bottom:3px;';

  const num = document.createElement('div');
  num.className = 'day-num';
  num.textContent = day;
  dayRow.appendChild(num);

  const fest = getFestival(ds);
  if (fest) {
    const fl = document.createElement('div');
    fl.className = 'festival-label';
    fl.textContent = fest;
    dayRow.appendChild(fl);
  }

  cell.appendChild(dayRow);

  const dayEvs = eventsOnDate(ds);
  if (dayEvs.length) {
    cell.classList.add('has-events');
    const bars = document.createElement('div');
    bars.className = 'event-bars';
    dayEvs.slice(0, 2).forEach(ev => {
      const b = document.createElement('div');
      const evStart = effectiveDate(ev);
      const evEnd   = ev.endDate || evStart;
      let spanCls = '';
      if (evEnd > evStart) {
        if (ds === evStart)      spanCls = ' span-start';
        else if (ds === evEnd)   spanCls = ' span-end';
        else                     spanCls = ' span-mid';
      }
      b.className = `event-bar${spanCls}${ds < todayStr ? ' past' : ''}`;
      b.dataset.cat = ev.category;
      b.style.setProperty('--cc', getCatColor(ev.category));
      if (ev.repeat && ev.repeat !== 'none') {
        const ic = document.createElement('span');
        ic.className = 'rep-icon'; ic.textContent = '🔁';
        b.appendChild(ic);
      }
      b.appendChild(document.createTextNode((ev.time ? ev.time + ' ' : '') + ev.title));
      b.onclick = e => { e.stopPropagation(); openEditModal(ev.id); };
      bars.appendChild(b);
    });
    if (dayEvs.length > 2) {
      const more = document.createElement('div');
      more.className = 'event-more';
      more.textContent = `+${dayEvs.length - 2} 更多`;
      more.onclick = e => { e.stopPropagation(); openDayModal(ds); };
      bars.appendChild(more);
    }
    cell.appendChild(bars);
  }
  return cell;
}

function eventsOnDate(ds) {
  return events
    .filter(e => (activeCat === 'all' || e.category === activeCat) && isEventOnDate(e, ds))
    .sort((a, b) => (a.time || '99:99').localeCompare(b.time || '99:99'));
}

// ── Events List ───────────────────────────────────────────
function renderList() {
  const titleEl = document.getElementById('list-title');
  const listEl  = document.getElementById('events-list');
  const catNames = { all:'📋 全部事項匯整', kids:'👶 小孩', parents:'👨‍👩 父母', work:'💼 工作', personal:'🌿 屬自己' };
  titleEl.textContent = catNames[activeCat] + (activeCat !== 'all' ? ' 所有事項' : '');

  const todayStr = toDateStr(new Date());

  // Build display items (non-recurring: use ev.date; recurring: use next occurrence)
  const items = [];
  events
    .filter(e => activeCat === 'all' || e.category === activeCat)
    .forEach(ev => {
      const displayDate = nextOccurrence(ev, todayStr) || ev.date;
      items.push({ ev, displayDate });
    });

  items.sort((a, b) =>
    (a.displayDate + (a.ev.time || '99:99')).localeCompare(b.displayDate + (b.ev.time || '99:99'))
  );

  if (!items.length) {
    listEl.innerHTML = '<div class="no-events">📭 目前沒有事項</div>';
    return;
  }

  const grouped = {};
  items.forEach(it => { (grouped[it.displayDate] = grouped[it.displayDate] || []).push(it.ev); });

  listEl.innerHTML = '';
  Object.keys(grouped).sort().forEach(ds => {
    const isCollapsed = listCollapsed[ds] || false;

    const hdr = document.createElement('div');
    hdr.className = 'date-group-label';
    hdr.textContent = formatDateLabel(ds);
    if (ds === todayStr) {
      const badge = document.createElement('span');
      badge.className = 'today-badge'; badge.textContent = '今天';
      hdr.appendChild(badge);
    }
    const hdrFest = getFestival(ds);
    if (hdrFest) {
      const fb = document.createElement('span');
      fb.className = 'festival-badge'; fb.textContent = hdrFest;
      hdr.appendChild(fb);
    }
    const arrow = document.createElement('span');
    arrow.className = 'group-toggle' + (isCollapsed ? ' collapsed' : '');
    arrow.textContent = '▼';
    hdr.appendChild(arrow);

    const body = document.createElement('div');
    body.className = 'group-body' + (isCollapsed ? ' collapsed' : '');
    body.dataset.ds = ds;
    if (!isCollapsed) body.style.maxHeight = '2000px';

    hdr.onclick = () => {
      const nowCollapsed = !listCollapsed[ds];
      listCollapsed[ds] = nowCollapsed;
      arrow.classList.toggle('collapsed', nowCollapsed);
      body.classList.toggle('collapsed', nowCollapsed);
      if (!nowCollapsed) body.style.maxHeight = body.scrollHeight + 'px';
      else body.style.maxHeight = '0';
    };

    listEl.appendChild(hdr);
    listEl.appendChild(body);

    grouped[ds].forEach(ev => {
      const item = document.createElement('div');
      item.className = 'event-item' + (ds < todayStr ? ' past' : '');
      item.onclick = () => openEditModal(ev.id);

      const bar = document.createElement('div');
      bar.className = 'ev-bar';
      bar.dataset.cat = ev.category;
      bar.style.setProperty('--cc', getCatColor(ev.category));

      const info = document.createElement('div');
      info.className = 'ev-info';

      // Reminder text
      let remTxt = '';
      if (ev.reminder !== null && ev.reminder !== undefined) {
        const r = ev.reminder;
        if (r === 0)       remTxt = ' · 🔔 準時提醒';
        else if (r < 60)   remTxt = ` · 🔔 ${r}分前`;
        else if (r < 1440) remTxt = ` · 🔔 ${r/60}小時前`;
        else               remTxt = ` · 🔔 ${r/1440}天前`;
      }

      const titleDiv = document.createElement('div');
      titleDiv.className = 'ev-title';
      titleDiv.textContent = ev.title;
      if (ev.repeat && ev.repeat !== 'none') {
        const rb = document.createElement('span');
        rb.className = 'rep-badge';
        rb.textContent = '🔁 ' + (ev.repeat === 'custom' && ev.customDays?.length
          ? '每週' + ev.customDays.map(d => WD_NAMES[d]).join('、')
          : REPEAT_LABEL[ev.repeat]);
        titleDiv.appendChild(rb);
      }

      const metaDiv = document.createElement('div');
      metaDiv.className = 'ev-meta';
      const rangeStr = (ev.endDate && ev.endDate !== ev.date)
        ? ` · 📅 ${shortDate(ev.originalDate || ev.date)}—${shortDate(ev.endDate)}` : '';
      const excStr = (ev.exceptions && ev.exceptions.length) ? ` · 🚫 ${ev.exceptions.length} 個例外` : '';
      metaDiv.textContent = (ev.time ? '⏰ ' + ev.time : '全天') + rangeStr + excStr + remTxt + (ev.notes ? ' · 📝 ' + ev.notes : '');

      info.appendChild(titleDiv);
      info.appendChild(metaDiv);

      const badge = document.createElement('div');
      badge.className = 'ev-badge';
      badge.dataset.cat = ev.category;
      badge.style.setProperty('--cc', getCatColor(ev.category));
      const c = getCat(ev.category);
      badge.textContent = c.name;

      item.appendChild(bar);
      item.appendChild(info);
      item.appendChild(badge);
      body.appendChild(item);
    });
  });
}

// ── Navigation ────────────────────────────────────────────
function prevMonth() {
  curMonth--; if (curMonth < 0)  { curMonth = 11; curYear--; }
  renderCalendar(); loadMonthNotes();
}
function nextMonth() {
  curMonth++; if (curMonth > 11) { curMonth = 0;  curYear++; }
  renderCalendar(); loadMonthNotes();
}
function goToday() {
  const t = new Date(); curMonth = t.getMonth(); curYear = t.getFullYear();
  renderCalendar(); loadMonthNotes();
}
function setCategory(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
  renderCalendar();
  renderList();
}

// ── Modal ─────────────────────────────────────────────────
function openAddModal(ds) {
  editingId = null;
  document.getElementById('modal-title').textContent = '新增事項';
  document.getElementById('f-title').value    = '';
  document.getElementById('f-date').value     = typeof ds === 'string' ? ds : toDateStr(new Date());
  document.getElementById('f-end-date').value = '';
  document.getElementById('f-time').value     = '';
  document.getElementById('f-reminder').value = '';
  document.getElementById('f-notes').value    = '';
  document.getElementById('f-repeat-end').value = '';
  document.querySelectorAll('input[name="rcat"]').forEach(r => r.checked = false);
  document.querySelectorAll('input[name="rrep"]').forEach(r => r.checked = false);
  document.getElementById('r-rep-none').checked = true;
  document.getElementById('repeat-end-row').style.display = 'none';
  document.getElementById('exceptions-row').style.display = 'none';
  document.getElementById('custom-days-row').style.display = 'none';
  document.querySelectorAll('.wd-check').forEach(c => c.checked = false);
  editingExceptions = [];
  renderExceptions();
  document.getElementById('f-shift-holiday').checked = false;
  const def = activeCat !== 'all' ? activeCat : 'kids';
  document.getElementById(`r-${def}`).checked = true;
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('btn-copy').style.display = 'none';
  document.getElementById('overlay').classList.add('show');
}

function openEditModal(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  editingId = id;
  document.getElementById('modal-title').textContent = '編輯事項';
  document.getElementById('f-title').value    = ev.title;
  document.getElementById('f-date').value     = ev.originalDate || ev.date;
  document.getElementById('f-end-date').value = ev.endDate || '';
  document.getElementById('f-time').value     = ev.time || '';
  document.getElementById('f-reminder').value = ev.reminder !== null && ev.reminder !== undefined ? String(ev.reminder) : '';
  document.getElementById('f-notes').value    = ev.notes || '';
  document.getElementById('f-repeat-end').value = ev.repeatEnd || '';
  document.querySelectorAll('input[name="rcat"]').forEach(r => r.checked = false);
  document.querySelectorAll('input[name="rrep"]').forEach(r => r.checked = false);
  document.getElementById(`r-${ev.category}`).checked = true;
  document.getElementById(`r-rep-${ev.repeat || 'none'}`).checked = true;
  const isRecurring = ev.repeat && ev.repeat !== 'none';
  document.getElementById('repeat-end-row').style.display = isRecurring ? 'block' : 'none';
  document.getElementById('exceptions-row').style.display = isRecurring ? 'block' : 'none';
  document.getElementById('custom-days-row').style.display = ev.repeat === 'custom' ? 'block' : 'none';
  document.querySelectorAll('.wd-check').forEach(c => {
    c.checked = (ev.customDays || []).includes(parseInt(c.value));
  });
  editingExceptions = ev.exceptions ? [...ev.exceptions] : [];
  renderExceptions();
  document.getElementById('f-shift-holiday').checked = !!ev.shiftIfHoliday;
  document.getElementById('btn-delete').style.display = 'block';
  document.getElementById('btn-copy').style.display = 'block';
  document.getElementById('overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
  editingId = null;
}

function openDayModal(ds) {
  const d = parseLocalDate(ds);
  document.getElementById('day-modal-title').textContent =
    `${d.getMonth() + 1}月${d.getDate()}日 全部事項`;
  const list = document.getElementById('day-modal-list');
  list.innerHTML = '';
  eventsOnDate(ds).forEach(ev => {
    const item = document.createElement('div');
    item.className = 'day-modal-item';
    item.style.setProperty('--cc', getCatColor(ev.category));
    const dot = document.createElement('span');
    dot.className = 'day-modal-dot';
    const info = document.createElement('div');
    info.className = 'day-modal-info';
    const titleEl = document.createElement('div');
    titleEl.className = 'day-modal-title-text';
    titleEl.textContent = (ev.time ? ev.time + ' ' : '') + ev.title;
    const meta = document.createElement('div');
    meta.className = 'day-modal-meta';
    const cat = categories.find(c => c.id === ev.category);
    meta.textContent = cat ? cat.icon + ' ' + cat.name : '';
    info.appendChild(titleEl);
    info.appendChild(meta);
    item.appendChild(dot);
    item.appendChild(info);
    item.onclick = () => { closeDayModal(); openEditModal(ev.id); };
    list.appendChild(item);
  });
  document.getElementById('day-overlay').classList.add('show');
}
function closeDayModal() {
  document.getElementById('day-overlay').classList.remove('show');
}
function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function saveEvent() {
  const title     = document.getElementById('f-title').value.trim();
  const date      = document.getElementById('f-date').value;
  const endDate   = document.getElementById('f-end-date').value;
  const time      = document.getElementById('f-time').value;
  const reminderV = document.getElementById('f-reminder').value;
  const notes     = document.getElementById('f-notes').value.trim();
  const catEl     = document.querySelector('input[name="rcat"]:checked');
  const repEl     = document.querySelector('input[name="rrep"]:checked');
  const repeatEnd = document.getElementById('f-repeat-end').value;

  const customDays = [...document.querySelectorAll('.wd-check:checked')].map(c => parseInt(c.value));

  if (!title)  { alert('請輸入事項名稱'); return; }
  if (!date)   { alert('請選擇日期');     return; }
  if (!catEl)  { alert('請選擇分類');     return; }
  if (endDate && endDate < date) { alert('結束日期不能早於開始日期'); return; }
  if (repEl?.value === 'custom' && customDays.length === 0) { alert('請至少選擇一個星期'); return; }

  const reminder = reminderV === '' ? null : parseInt(reminderV);
  const repeat   = repEl ? repEl.value : 'none';
  const category = catEl.value;
  const shiftIfHoliday = document.getElementById('f-shift-holiday').checked;

  const originalDate = date;
  let finalDate = date;
  if (shiftIfHoliday && isHoliday(date)) {
    finalDate = prevWorkday(date);
    alert(`原定日期 ${date} 為假日，已自動提前至 ${formatDateLabel(finalDate)}`);
  }

  const isNew = !editingId;
  if (editingId) {
    const idx = events.findIndex(e => e.id === editingId);
    if (idx !== -1)
      events[idx] = { ...events[idx], title, date: finalDate, originalDate, endDate: endDate || null, time: time || null, reminder, notes, category, repeat, repeatEnd: repeatEnd || null, shiftIfHoliday, customDays: repeat === 'custom' ? customDays : [], exceptions: repeat !== 'none' ? [...editingExceptions] : [] };
  } else {
    events.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      title, date: finalDate, originalDate, endDate: endDate || null, time: time || null, reminder, notes, category, repeat, repeatEnd: repeatEnd || null, shiftIfHoliday, customDays: repeat === 'custom' ? customDays : [], exceptions: repeat !== 'none' ? [...editingExceptions] : [],
    });
  }

  persist();
  closeModal();
  if (isNew) {
    const nd = parseLocalDate(finalDate);
    curYear = nd.getFullYear();
    curMonth = nd.getMonth();
    loadMonthNotes();
  }
  renderCalendar();
  renderList();
  scheduleAll();
}

function addException() {
  const d = document.getElementById('f-exc-date').value;
  if (!d || editingExceptions.includes(d)) return;
  editingExceptions.push(d);
  editingExceptions.sort();
  renderExceptions();
  document.getElementById('f-exc-date').value = '';
}

function removeException(d) {
  editingExceptions = editingExceptions.filter(x => x !== d);
  renderExceptions();
}

function renderExceptions() {
  const el = document.getElementById('exceptions-list');
  if (!el) return;
  el.innerHTML = '';
  editingExceptions.forEach(d => {
    const item = document.createElement('div');
    item.className = 'exc-item';
    const lbl = document.createElement('span');
    lbl.textContent = formatDateLabel(d);
    const btn = document.createElement('button');
    btn.className = 'exc-del';
    btn.textContent = '×';
    btn.onclick = () => removeException(d);
    item.appendChild(lbl);
    item.appendChild(btn);
    el.appendChild(item);
  });
}

function deleteEvent() {
  if (!editingId) return;
  if (!confirm('確定要刪除這個事項嗎？')) return;
  events = events.filter(e => e.id !== editingId);
  persist();
  closeModal();
  renderCalendar();
  renderList();
  scheduleAll();
}

function copyEvent() {
  if (!editingId) return;
  const ev = events.find(e => e.id === editingId);
  if (!ev) return;
  closeModal();
  // Re-open as new event with all fields copied but date cleared
  editingId = null;
  document.getElementById('modal-title').textContent = '複製行程';
  document.getElementById('f-title').value    = ev.title;
  document.getElementById('f-date').value     = ev.originalDate || ev.date;
  document.getElementById('f-end-date').value = ev.endDate || '';
  document.getElementById('f-time').value     = ev.time || '';
  document.getElementById('f-reminder').value = ev.reminder !== null && ev.reminder !== undefined ? String(ev.reminder) : '';
  document.getElementById('f-notes').value    = ev.notes || '';
  document.getElementById('f-repeat-end').value = ev.repeatEnd || '';
  document.querySelectorAll('input[name="rcat"]').forEach(r => r.checked = false);
  document.querySelectorAll('input[name="rrep"]').forEach(r => r.checked = false);
  document.getElementById(`r-${ev.category}`).checked = true;
  document.getElementById(`r-rep-${ev.repeat || 'none'}`).checked = true;
  const isRecurring = ev.repeat && ev.repeat !== 'none';
  document.getElementById('repeat-end-row').style.display = isRecurring ? 'block' : 'none';
  document.getElementById('exceptions-row').style.display = 'none';
  document.getElementById('custom-days-row').style.display = ev.repeat === 'custom' ? 'block' : 'none';
  document.querySelectorAll('.wd-check').forEach(c => {
    c.checked = (ev.customDays || []).includes(parseInt(c.value));
  });
  editingExceptions = [];
  renderExceptions();
  document.getElementById('f-shift-holiday').checked = !!ev.shiftIfHoliday;
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('btn-copy').style.display = 'none';
  document.getElementById('overlay').classList.add('show');
}

  const d = parseLocalDate(ds);
  const dow = d.getDay();
  return dow === 0 || dow === 6 || TW_HOLIDAYS.has(ds);

// ── Emoji picker ─────────────────────────────────────────
const EMOJI_LIST = [
  '👶','🧒','👦','👧','🧑','👩','👨','👴','👵','👪','👨‍👩‍👧','👨‍👩‍👦',

  '🌿','🌸','🌻','🌈','⭐','🌙','☀️','❤️','💛','💙','💜','🧡',
  '🎂','🎁','🎉','🎊','🏆','🥇','🎯','🎵','🎮','⚽','🏀','🏊',
  '🍎','🍕','🍜','☕','🍰','🛒','🚗','✈️','🏖','🏠','🏥','💊',
  '🔔','⚠️','❗','💰','🛠','🧹','👔','👗','🎓','🩺','📱','💻',
];

function buildEmojiPanel(panelId, btnId, hiddenId) {
  const panel = document.getElementById(panelId);
  if (panel.children.length) return; // already built
  EMOJI_LIST.forEach(em => {
    const b = document.createElement('button');
    b.className = 'emoji-opt'; b.type = 'button'; b.textContent = em;
    b.onclick = () => {
      document.getElementById(hiddenId).value = em;
      document.getElementById(btnId).textContent = em;
      panel.classList.remove('open');
    };
    panel.appendChild(b);
  });
}

function toggleEmojiPanel(panelId, btnId, hiddenId) {
  buildEmojiPanel(panelId, btnId, hiddenId || panelId.replace('-panel','-hidden'));
  document.getElementById(panelId).classList.toggle('open');
}

// Close emoji panels when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('.emoji-picker-wrap')) {
    document.querySelectorAll('.emoji-panel.open').forEach(p => p.classList.remove('open'));
  }
});

// ── Category Manager ─────────────────────────────────────
function openCatManager() {
  renderCatMgrList();
  document.getElementById('cat-overlay').classList.add('show');
}
function closeCatManager() {
  document.getElementById('cat-overlay').classList.remove('show');
}

function renderCatMgrList() {
  const el = document.getElementById('cat-mgr-list');
  el.innerHTML = '';
  categories.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'cat-mgr-item';

    const sw = document.createElement('div');
    sw.className = 'cat-mgr-swatch';
    sw.style.background = c.color;

    const nm = document.createElement('div');
    nm.className = 'cat-mgr-name';
    nm.textContent = c.icon + ' ' + c.name;

    const upBtn = document.createElement('button');
    upBtn.className = 'cat-mgr-move'; upBtn.textContent = '▲';
    upBtn.disabled = i === 0;
    upBtn.onclick = () => moveCat(i, -1);

    const dnBtn = document.createElement('button');
    dnBtn.className = 'cat-mgr-move'; dnBtn.textContent = '▼';
    dnBtn.disabled = i === categories.length - 1;
    dnBtn.onclick = () => moveCat(i, 1);

    const editBtn = document.createElement('button');
    editBtn.className = 'cat-mgr-edit';
    editBtn.textContent = '編輯';
    editBtn.onclick = () => editCategory(i);

    const delBtn = document.createElement('button');
    delBtn.className = 'cat-mgr-del';
    delBtn.textContent = '×';
    delBtn.onclick = () => deleteCategory(i);

    row.appendChild(sw); row.appendChild(nm);
    row.appendChild(upBtn); row.appendChild(dnBtn);
    row.appendChild(editBtn); row.appendChild(delBtn);
    el.appendChild(row);
  });
}

function moveCat(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= categories.length) return;
  [categories[i], categories[j]] = [categories[j], categories[i]];
  persistCats(); rebuildCAT();
  renderCatTabs(); renderCatRadios(); renderCatMgrList();
}

function addCategory() {
  const icon  = document.getElementById('new-cat-icon').value.trim();
  const name  = document.getElementById('new-cat-name').value.trim();
  const color = document.getElementById('new-cat-color').value;
  if (!name) { alert('請輸入名稱'); return; }
  const id = 'cat_' + Date.now().toString(36);
  categories.push({ id, name, icon, color });
  persistCats(); rebuildCAT();
  renderCatTabs(); renderCatRadios(); renderCatMgrList();
  document.getElementById('new-cat-icon').value = '';
  document.getElementById('new-cat-name').value = '';
}

function editCategory(i) {
  const el  = document.getElementById('cat-mgr-list');
  const row = el.children[i];
  const c   = categories[i];
  row.innerHTML = '';
  row.style.flexWrap = 'wrap';

  const emojiWrap = document.createElement('div');
  emojiWrap.className = 'emoji-picker-wrap';
  const emojiBtn = document.createElement('button');
  emojiBtn.className = 'emoji-btn'; emojiBtn.type = 'button';
  emojiBtn.textContent = c.icon || '😀';
  const emojiHidden = document.createElement('input');
  emojiHidden.type = 'hidden'; emojiHidden.value = c.icon || '😀';
  const emojiPanel = document.createElement('div');
  emojiPanel.className = 'emoji-panel';
  const epId = 'ep-' + i, ebId = 'eb-' + i, ehId = 'eh-' + i;
  emojiPanel.id = epId; emojiBtn.id = ebId; emojiHidden.id = ehId;
  emojiBtn.onclick = () => toggleEmojiPanel(epId, ebId, ehId);
  emojiWrap.appendChild(emojiBtn); emojiWrap.appendChild(emojiHidden); emojiWrap.appendChild(emojiPanel);
  // alias iconInp to emojiHidden for save logic
  const iconInp = emojiHidden;

  const nameInp = document.createElement('input');
  nameInp.type = 'text'; nameInp.value = c.name; nameInp.maxLength = 10;
  nameInp.style.cssText = 'flex:1;min-width:60px;padding:5px 8px;border:2px solid #e8e8e8;border-radius:8px;font-size:.9rem';

  const colorInp = document.createElement('input');
  colorInp.type = 'color'; colorInp.value = c.color;
  colorInp.style.cssText = 'width:42px;height:38px;padding:2px;border:2px solid #e8e8e8;border-radius:8px;cursor:pointer';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'cat-mgr-edit'; saveBtn.textContent = '✓ 儲存';
  saveBtn.onclick = () => {
    const name = nameInp.value.trim();
    if (!name) { alert('請輸入名稱'); return; }
    categories[i] = { ...c, icon: iconInp.value.trim(), name, color: colorInp.value };
    persistCats(); rebuildCAT();
    renderCatTabs(); renderCatRadios(); renderCatMgrList();
    renderCalendar(); renderList();
  };

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'cat-mgr-del'; cancelBtn.textContent = '✕';
  cancelBtn.onclick = () => renderCatMgrList();

  row.appendChild(emojiWrap); row.appendChild(nameInp);
  row.appendChild(colorInp); row.appendChild(saveBtn); row.appendChild(cancelBtn);
}

function deleteCategory(i) {
  const c = categories[i];
  const inUse = events.some(e => e.category === c.id);
  if (inUse && !confirm(`「${c.name}」仍有事項使用中，確定刪除分類？\n（事項不會刪除，但分類顯示為未知）`)) return;
  if (!inUse && !confirm(`確定刪除「${c.name}」？`)) return;
  categories.splice(i, 1);
  persistCats(); rebuildCAT();
  if (activeCat === c.id) activeCat = 'all';
  renderCatTabs(); renderCatRadios(); renderCatMgrList();
  renderCalendar(); renderList();
}

function mothersDayStr(year) {
  // 每年5月第二個週日
  const d = new Date(year, 4, 1);
  let sundays = 0;
  while (true) {
    if (d.getDay() === 0 && ++sundays === 2) return toDateStr(d);
    d.setDate(d.getDate() + 1);
  }
}

function getFestival(ds) {
  if (DATED_FESTIVALS[ds]) return DATED_FESTIVALS[ds];
  if (ds === mothersDayStr(parseInt(ds))) return '母親節';
  return FIXED_FESTIVALS[ds.slice(5).replace('-', '')] || null;
}

function prevWorkday(ds) {
  const d = parseLocalDate(ds);
  d.setDate(d.getDate() - 1);
  let s = toDateStr(d);
  while (isHoliday(s)) {
    d.setDate(d.getDate() - 1);
    s = toDateStr(d);
  }
  return s;
}

// For non-repeating events with shiftIfHoliday, return the shifted date
function effectiveDate(ev) {
  if (!ev.shiftIfHoliday || (ev.repeat && ev.repeat !== 'none')) return ev.date;
  return isHoliday(ev.date) ? prevWorkday(ev.date) : ev.date;
}

// ── Helpers ───────────────────────────────────────────────
function persist() { saveToCloud({ events }); }

// ── Monthly notes ─────────────────────────────────────────
let notesSaveTimer = null;
function notesKey() { return `${curYear}-${pad(curMonth+1)}`; }
function loadMonthNotes() {
  document.getElementById('month-notes').value = allNotes[notesKey()] || '';
  document.getElementById('notes-title').textContent = `📝 ${curYear}年${curMonth+1}月備註`;
  document.getElementById('notes-hint').textContent = '';
}
function saveMonthNotes() {
  clearTimeout(notesSaveTimer);
  notesSaveTimer = setTimeout(() => {
    allNotes[notesKey()] = document.getElementById('month-notes').value;
    saveToCloud({ notes: allNotes });
    const hint = document.getElementById('notes-hint');
    hint.textContent = '已儲存';
    setTimeout(() => { hint.textContent = ''; }, 1500);
  }, 600);
}

function toDateStr(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function parseLocalDate(ds) { return new Date(ds + 'T12:00:00'); }
function pad(n) { return String(n).padStart(2, '0'); }

function shortDate(ds) {
  const d = parseLocalDate(ds);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function formatDateLabel(ds) {
  const d = parseLocalDate(ds);
  const days = ['日','一','二','三','四','五','六'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}

// ── Backup / Restore ──────────────────────────────────────
function exportBackup() {
  const data = {
    events, categories, notes: allNotes,
    headerSub:   localStorage.getItem('fam-cal-sub')   || '生活管理',
    headerTitle: localStorage.getItem('fam-cal-title') || '🗓 家庭行事曆'
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = `家庭行事曆備份_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

async function importBackup(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!confirm('確定要還原備份？雲端資料將被覆蓋。')) return;
      // 支援舊版 localStorage 格式
      if (data['fam-cal-v2']) {
        const patch = { events: JSON.parse(data['fam-cal-v2']) };
        if (data['fam-cal-cats']) patch.categories = JSON.parse(data['fam-cal-cats']);
        await getDocRef().set(patch, { merge: true });
      } else {
        await getDocRef().set(data);
      }
      alert('還原成功！');
    } catch(err) {
      alert('檔案格式錯誤，無法還原。');
      console.error(err);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Start ─────────────────────────────────────────────────
init();
